name: Deploy to GitHub Pages

on:
  # S'executa automàticament cada cop que fas push a la branca principal
  push:
    branches: ["main"]
  # Permet executar el flux manualment des de la pestanya "Actions" de GitHub
  workflow_dispatch:

# Configura els permisos necessaris perquè l'acció pugui publicar a Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita que s'executin múltiples desplegaments simultanis
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codi
        uses: actions/checkout@v4
        
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Instal·lar dependències
        run: npm install
        
      - name: Compilar el projecte (Build)
        run: npm run build
        
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4
        
      - name: Pujar els arxius (Artifact)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
